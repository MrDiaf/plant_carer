services:
  backend:
    build:
      context: ./backend
    environment:
      DATABASE_PATH: /data/plant-carer.sqlite3
    expose:
      - "8000"
    volumes:
      - plant_data:/data

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - target: 2026
        published: "${FRONTEND_PORT:-2026}"
        protocol: tcp
        host_ip: 0.0.0.0
    environment:
      VITE_API_BASE: ""

volumes:
  plant_data:
